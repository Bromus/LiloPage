<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0d0612">
  <title>Lilo fyller 11 — spökfest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="haunt" aria-hidden="true">
    <div class="haunt__vignette"></div>
    <div class="haunt__stars"></div>
    <div class="haunt__moon"></div>
    <div class="haunt__fog haunt__fog--1"></div>
    <div class="haunt__fog haunt__fog--2"></div>
    <div class="haunt__fog haunt__fog--3"></div>

    <div class="haunt__eyes">
      <span class="haunt__eye-pair haunt__eye-pair--a"></span>
      <span class="haunt__eye-pair haunt__eye-pair--b"></span>
      <span class="haunt__eye-pair haunt__eye-pair--c"></span>
    </div>

    <div class="haunt__ghosts">
      <svg class="ghost ghost--1" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="rgba(232,240,255,0.16)" d="M50 10 C28 10 12 28 12 50 L12 100 Q20 114 28 100 Q36 114 44 100 Q50 114 56 100 Q64 114 72 100 Q80 114 88 100 L88 50 C88 28 72 10 50 10Z"/>
        <ellipse cx="36" cy="48" rx="7" ry="9" fill="#0d0612"/>
        <ellipse cx="64" cy="48" rx="7" ry="9" fill="#0d0612"/>
      </svg>
      <svg class="ghost ghost--2" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="rgba(180,255,210,0.11)" d="M50 14 C32 14 18 30 18 48 L18 98 Q26 110 34 98 Q42 110 50 98 Q58 110 66 98 Q74 110 82 98 L82 48 C82 30 68 14 50 14Z"/>
        <ellipse cx="38" cy="46" rx="6" ry="8" fill="#0d0612"/>
        <ellipse cx="62" cy="46" rx="6" ry="8" fill="#0d0612"/>
      </svg>
      <svg class="ghost ghost--3" viewBox="0 0 100 130" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="rgba(255,200,255,0.12)" d="M50 8 C26 8 8 28 8 52 L8 102 Q16 116 24 102 Q32 116 40 102 Q50 116 60 102 Q68 116 76 102 Q84 116 92 102 L92 52 C92 28 74 8 50 8Z"/>
        <ellipse cx="36" cy="50" rx="7" ry="9" fill="#0d0612"/>
        <ellipse cx="64" cy="50" rx="7" ry="9" fill="#0d0612"/>
      </svg>
    </div>
  </div>

  <main class="wrap">
    <article class="invite" id="invite-card">
      <header class="invite__head">
        <p class="eyebrow eyebrow--single">
          <span class="eyebrow__glyph" aria-hidden="true">☾</span> Spökfest · bara inbjudna
        </p>
        <h1 class="title title--glitch">
          <span class="title__line title__line--name">Lilo</span>
          <span class="title__line title__line--turns">fyller</span>
          <span class="title__age-wrap">
            <span class="age" aria-label="11 år">11</span>
          </span>
        </h1>
      </header>

      <p class="air-dots" aria-hidden="true">· · ·</p>

      <p class="greeting">
        <span class="greeting__line1">
          <span class="greeting__hey">Hej</span>
          <span class="guest-name" id="guest-name">kompis</span><span class="greeting__comma">!</span>
        </span>
      </p>

      <section class="details" aria-label="Tid och plats">
        <h2 class="details__h">Var &amp; när</h2>
        <ul class="details__list">
          <li><span class="details__icon" aria-hidden="true">✦</span><span><strong>Datum</strong> — <span class="placeholder">…</span></span></li>
          <li><span class="details__icon" aria-hidden="true">✦</span><span><strong>Tid</strong> — <span class="placeholder">…</span></span></li>
          <li><span class="details__icon" aria-hidden="true">✦</span><span><strong>Plats</strong> — <span class="placeholder">…</span></span></li>
        </ul>
      </section>

      <section class="rsvp" id="rsvp-pending" aria-labelledby="rsvp-heading">
        <p class="rsvp__tag">OSA</p>
        <h2 class="rsvp__h" id="rsvp-heading">Kommer du?</h2>
        <button type="button" class="btn btn--accept" id="accept-btn">
          <span class="btn__text">Jag kommer</span>
          <span class="btn__glow" aria-hidden="true"></span>
        </button>
      </section>

      <section class="rsvp rsvp--done" id="rsvp-done" hidden>
        <div class="celebrate celebrate--air" aria-hidden="true">
          <svg class="celebrate__svg" viewBox="0 0 320 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="4" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <text x="160" y="58" text-anchor="middle" class="celebrate__boo" filter="url(#glow)">BU!</text>
            <path fill="rgba(168,85,255,0.35)" d="M40 75 Q80 55 120 75 T200 75 T280 75 L320 100 H0Z"/>
          </svg>
        </div>
        <p class="rsvp__tag rsvp__tag--yes">Klart</p>
        <h2 class="rsvp__h">Vi ses!</h2>
        <p class="rsvp__thanks">
          Tack <span class="guest-name" id="thanks-name">kompis</span> — du är <strong>anmäld</strong>.
        </p>
      </section>
    </article>
  </main>

  <script src="invite.js"></script>
</body>
</html>
