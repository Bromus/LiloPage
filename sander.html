<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#ff00aa">
  <title>Sander 6 år — 6 7-kalas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="sander.css">
</head>
<body class="sander-page">
  <div class="brainrot-bg" aria-hidden="true">
    <div class="brainrot-bg__grid"></div>
    <div class="brainrot-bg__flash brainrot-bg__flash--1"></div>
    <div class="brainrot-bg__flash brainrot-bg__flash--2"></div>
    <div class="brainrot-bg__flash brainrot-bg__flash--3"></div>
  </div>

  <div class="sander-sky" aria-hidden="true">
    <div class="mega-67 mega-67--back">
      <span class="mega-67__n mega-67__n--6">6</span>
      <span class="mega-67__n mega-67__n--7">7</span>
    </div>
    <span class="num-float num-float--d6 num-float--p1">6</span>
    <span class="num-float num-float--d7 num-float--p2">7</span>
    <span class="num-float num-float--d6 num-float--p3">6</span>
    <span class="num-float num-float--d7 num-float--p4">7</span>
    <span class="num-float num-float--d6 num-float--p5">6</span>
    <span class="num-float num-float--d7 num-float--p6">7</span>
    <span class="num-float num-float--d6 num-float--p7">6</span>
    <span class="num-float num-float--d7 num-float--p8">7</span>

    <svg class="hype-hands" viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <g fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M45 95 V55 Q45 40 55 38 Q60 36 62 45 L65 70 Q66 78 72 78 Q78 78 78 70 V35 Q78 22 88 22 Q98 22 98 35 V75" opacity="0.5"/>
        <path d="M155 95 V55 Q155 40 145 38 Q140 36 138 45 L135 70 Q134 78 128 78 Q122 78 122 70 V35 Q122 22 112 22 Q102 22 102 35 V75" opacity="0.5"/>
      </g>
    </svg>
  </div>

  <main class="wrap">
    <article class="invite" id="invite-card">
      <header class="invite__head">
        <p class="eyebrow">
          <span class="eyebrow__chant">6 7</span>
          <span class="eyebrow__sub">kalasläge · bara inbjudna</span>
        </p>
        <h1 class="title">
          <span class="title__name">Sander</span>
          <span class="title__turns">fyller</span>
          <span class="title__age" aria-label="6 år">6</span>
        </h1>
        <p class="meme-line">Ingen förklaring. Bara tårta.</p>
      </header>

      <p class="air-dots" aria-hidden="true">6 · 7 · 6 · 7</p>

      <p class="greeting">
        <span class="greeting__line1">
          <span class="greeting__hey">Hej,</span> <span class="guest-name" id="guest-name">kompis</span><span class="greeting__bang">!</span>
        </span>
      </p>

      <section class="details" aria-label="Tid och plats">
        <h2 class="details__h">Var &amp; när</h2>
        <ul class="details__list">
          <li><span class="details__dot" aria-hidden="true">6</span><span><strong>Datum</strong> — <span class="placeholder">…</span></span></li>
          <li><span class="details__dot" aria-hidden="true">7</span><span><strong>Tid</strong> — <span class="placeholder">…</span></span></li>
          <li><span class="details__dot" aria-hidden="true">6</span><span><strong>Plats</strong> — <span class="placeholder">…</span></span></li>
        </ul>
      </section>

      <section class="rsvp" id="rsvp-pending" aria-labelledby="rsvp-heading">
        <p class="rsvp__tag">OSA</p>
        <h2 class="rsvp__h" id="rsvp-heading">6 7 — kommer du?</h2>
        <button type="button" class="btn btn--accept" id="accept-btn">
          <span class="btn__text">6 7 jag kommer!</span>
        </button>
      </section>

      <section class="rsvp rsvp--done" id="rsvp-done" hidden>
        <div class="celebrate" aria-hidden="true">
          <svg class="celebrate__svg" viewBox="0 0 320 120" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <filter id="sander-glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="4" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <text x="160" y="52" text-anchor="middle" class="celebrate__67a" filter="url(#sander-glow)">6</text>
            <text x="160" y="108" text-anchor="middle" class="celebrate__67b" filter="url(#sander-glow)">7</text>
          </svg>
        </div>
        <p class="rsvp__tag rsvp__tag--yes">Klart</p>
        <h2 class="rsvp__h">6 7 vi ses!</h2>
        <p class="rsvp__thanks">
          Tack <span class="guest-name" id="thanks-name">kompis</span> — du är <strong>anmäld</strong>.
        </p>
      </section>
    </article>
  </main>

  <script src="invite.js"></script>
</body>
</html>
